<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Achievement System - Template</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" type="text/css" media="all" href="../static/css/as.css" th:href="@{/css/as.css?v=2}"/>
</head>
<body>

<div class="app-container">
    <div class="logo-container">
        <img src="../static/images/aslogo.png" th:src="@{/images/aslogo.png}" th:alt-title="#{title.application}" alt="AS logo" class="app-logo" />
    </div>

    <h2 th:text="#{title.new}">Create New Template</h2>

    <form action="#" th:action="@{/templates/create}" th:object="${templateDTO}" method="post">
        <fieldset>
            <legend th:text="#{template.data}">Template Data</legend>

            <ul th:if="${#fields.hasErrors('*')}" class="errorList">
                <li th:each="err : ${#fields.hasErrors('*')}" th:text="${err}">Input is incorrect</li>
            </ul>

            <div class="form-group">
                <label for="templateName" id="templateNameLabel" th:text="#{template.templateName}">Template Name</label>
                <input type="text" id="templateName" th:field="*{templateName}" th:errorclass="fieldError" placeholder="Enter template name..."/>
            </div>

            <div class="form-group">
                <label th:text="#{template.types}">Type of Template</label>
                <div class="radio-group">
                    <div class="radio-option" th:each="type : ${allTypes}">
                        <input type="radio" th:field="*{type}" th:value="${type}"/>
                        <label th:for="${#ids.prev('type')}" th:text="#{${'template.types.' + type}}">Form</label>
                    </div>
                </div>
            </div>

            <div class="fields-container">
                <div th:each="field, stat : *{fields}" class="field-item">
                    <div th:replace="~{fragments/fields :: ${field.type}(field=${field}, index=${stat.index})}"></div>
                </div>
            </div>

            <div class="action-buttons">
                <button type="button" id="manageFieldsBtn" class="btn-secondary">
                    <svg style="width:20px;height:20px;margin-right:8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                    <span>Manage Fields</span>
                </button>
                
                <button type="submit" name="save" class="btn-primary" th:text="#{template.create}">Finalize Template</button>
            </div>
        </fieldset>
    </form>
</div>

<!-- Hidden template for new fields so Javascript can clone the thymeleaf fragment directly -->

<!--    </div>-->
<!--</template>-->

<!-- Modal Overlay -->
<div class="modal-overlay" id="fieldManagerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Manage Fields</h3>
            <button type="button" class="btn-close" id="closeModalBtn">
                <svg style="width:24px;height:24px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        
        <div class="modal-table-container">
            <table class="modal-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">Index</th>
                        <th>Type</th>
                        <th class="actions-cell">Actions</th>
                    </tr>
                </thead>
                <tbody id="modalFieldsTableBody">
                    <!-- Rows dynamically generated by JS -->
                </tbody>
            </table>
        </div>
        
        <div class="modal-footer">
            <button type="button" class="btn-secondary" id="addRowBtn">
                <svg style="width:18px;height:18px;margin-right:8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Row
            </button>
            <button type="button" class="btn-primary" id="saveModalBtn">Save Configuration</button>
        </div>
    </div>
</div>

<script src="../static/js/form.js" th:src="@{/js/form.js}"></script>

</body>
</html>
