<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org">

<head>
    <title>Achivement System - Template</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" type="text/css" media="all" href="../static/css/as.css" th:href="@{/css/as.css}"/>
</head>

<body>

<div>

    <img src="../static/images/aslogo.png" alt="AS logo" title="AS logo"
         th:src="@{/images/aslogo.png}" th:alt-title="#{title.application}"
         width="378" height="80" />

</div>

<div>

    <h2 th:text="#{title.new}">Create new template</h2>

    <form action="#" th:action="@{/templates/create}" th:object="${templateDTO}" method="post">

        <fieldset>

            <legend th:text="#{template.data}">Template Data</legend>

            <ul th:if="${#fields.hasErrors('*')}" class="errorList">
                <li th:each="err : ${#fields.hasErrors('*')}" th:text="${err}">Input is incorrect</li>
            </ul>

            <div>
                <label for="templateName">
                    <span th:text="#{template.templateName}">Template Name</span>
                </label>
                <input type="text" th:field="*{templateName}" th:errorclass="fieldError" />
            </div>
            <div>
                <label th:text="#{template.types}">Type of Template</label>
                <ul>
                    <li th:each="type : ${allTypes}">
                        <input type="radio" th:field="*{type}" th:value="${type}" />
                        <label th:for="${#ids.prev('type')}" th:text="#{${'template.types.' + type}}">Form</label>
                    </li>
                </ul>
            </div>
            <div>
                <label th:text="#{template.fields}">Template Fields</label>
                <div>

                </div>
            </div>

            <div class="submit">
                <button type="submit" name="save" th:text="#{template.create}">Finalize Template</button>
            </div>

        </fieldset>

    </form>

</div>

</body>


</html>
